name: Release (Snapshot)

on:
  push:
    tags:
      - "v*-SNAPSHOT"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build"
        required: true

permissions:
  contents: write

env:
  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
  STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
  STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}

jobs:
  prepare:
    runs-on: [self-hosted, linux]

    outputs:
      should_format: ${{ steps.decide.outputs.should_format }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Decide if formatting should run
        id: decide
        run: |
          # Default: do NOT format
          SHOULD_FORMAT=false

          # Only format on tag push (not workflow_dispatch)
          if [ "${{ github.event_name }}" = "push" ]; then

            TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
            HEAD_COMMIT=$(git rev-parse HEAD)

            echo "Tag commit: $TAG_COMMIT"
            echo "HEAD commit: $HEAD_COMMIT"

            # Only format if tag points to latest commit
            if [ "$TAG_COMMIT" = "$HEAD_COMMIT" ]; then
              SHOULD_FORMAT=true
            fi
          fi

          echo "should_format=$SHOULD_FORMAT" >> $GITHUB_OUTPUT

  format:
    needs: prepare
    runs-on: [self-hosted, linux]

    if: needs.prepare.outputs.should_format == 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Apply formatting
        run: mvn -B -Pformat clean initialize spotless:apply

      - name: Commit & push if needed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git diff --cached --quiet || git commit -m "[NIGHTLY] Apply code formatting"

          git push || echo "Push failed, continuing..."

  linux:
    needs: [format, prepare]
    runs-on: [self-hosted, linux]

    if: always()

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [{
              "id": "nexus.kbra.lu-nightly",
              "username": "${{ secrets.MAVEN_USERNAME }}",
              "password": "${{ secrets.MAVEN_PASSWORD }}"
            },
            {
              "id": "steam",
              "username": "${{ secrets.STEAM_USERNAME }}",
              "password": "${{ secrets.STEAM_PASSWORD }}"
            }]

      - name: Clone pclib
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UnKabaraQuiDev/PCLib.git pclib

      - name: Build pclib
        run: mvn -B install -DskipTests
        working-directory: pclib

      - name: Clone StandaloneGameEngine
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UnKabaraQuiDev/StandaloneGameEngine.git gameengine

      - name: Build StandaloneGameEngine
        run: mvn -B install -DskipTests
        working-directory: gameengine

      - name: Build Linux
        run: bash ./scripts/build-snapshot-linux.sh

  windows:
    needs: [format, prepare]
    runs-on: [self-hosted, windows]

    if: always()

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [{
              "id": "nexus.kbra.lu-nightly",
              "username": "${{ secrets.MAVEN_USERNAME }}",
              "password": "${{ secrets.MAVEN_PASSWORD }}"
            },
            {
              "id": "steam",
              "username": "${{ secrets.STEAM_USERNAME }}",
              "password": "${{ secrets.STEAM_PASSWORD }}"
            }]

      - name: Clone pclib
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UnKabaraQuiDev/PCLib.git pclib

      - name: Build pclib
        run: mvn -B install -DskipTests
        working-directory: pclib

      - name: Clone StandaloneGameEngine
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UnKabaraQuiDev/StandaloneGameEngine.git gameengine

      - name: Build StandaloneGameEngine
        run: mvn -B install -DskipTests
        working-directory: gameengine

      - name: Build Windows
        run: bash ./scripts/build-snapshot-windows.sh

  release:
    needs: [linux, windows]
    runs-on: [self-hosted, linux]

    if: always()

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Snapshot ${{ steps.tag.outputs.tag }}
          tag_name: ${{ steps.tag.outputs.tag }}
          make_latest: false
          prerelease: true