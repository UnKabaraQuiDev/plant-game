  name: Release (Nightly)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Debug
      run: git log --pretty=fuller --name-only -20

    - name: Check for commits in last 26h
      id: changes
      if: github.event_name == 'schedule'
      run: |
        git log --since='26 hours ago' -1 --oneline -- . ':(exclude).github/**'
        if [ -n "$(git log --since='26 hours ago' -1 --oneline -- . ':(exclude).github/**')" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        cat $GITHUB_OUTPUT

    - name: Detect SNAPSHOT version
      id: snapshot
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "version=$VERSION"
        if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
          echo "is_snapshot=true" >> $GITHUB_OUTPUT
        else
          echo "is_snapshot=false" >> $GITHUB_OUTPUT
        fi

    - name: Stop if not snapshot
      if: steps.snapshot.outputs.is_snapshot == 'false'
      run: |
        echo "Not a snapshot. Skipping build."

    - name: Stop if no changes
      if: github.event_name == 'schedule' && steps.changes.outputs.has_changes == 'false'
      run: |
        echo "No commits in last 26 hours. Skipping build."

    - uses: actions/setup-java@v5
      if: >
        steps.snapshot.outputs.is_snapshot == 'true' &&
        (
          github.event_name != 'schedule' ||
          steps.changes.outputs.has_changes == 'true'
        )
      with:
        distribution: temurin
        java-version: 21

    - name: Configure Maven servers
      if: >
        steps.snapshot.outputs.is_snapshot == 'true' &&
        (
          github.event_name != 'schedule' ||
          steps.changes.outputs.has_changes == 'true'
        )
      uses: s4u/maven-settings-action@v4.0.0
      with:
        servers: |
          [{
            "id": "nexus.kbra.lu-nightly",
            "username": "${{ secrets.MAVEN_USERNAME }}",
            "password": "${{ secrets.MAVEN_PASSWORD }}"
          },
          {
            "id": "steam",
            "username": "${{ secrets.STEAM_USERNAME }}",
            "password": "${{ secrets.STEAM_PASSWORD }}"
          }]

    - name: Deploy nightly
      if: >
        steps.snapshot.outputs.is_snapshot == 'true' &&
        (
          github.event_name != 'schedule' ||
          steps.changes.outputs.has_changes == 'true'
        )
      run: bash ./build-nightly.sh

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Nightly ${{ github.ref_name }}
        prerelease: true
        body: |
          ## Changes
          - Automated build

          ## Version
          ${{ github.ref_name }} ${{ github.sha }}
