name: Release (Nightly)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: write

env:
  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
  STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
  STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}

jobs:
  prepare:
    runs-on: [self-hosted, linux]

    outputs:
      is_snapshot: ${{ steps.snapshot.outputs.is_snapshot }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for commits
        id: changes
        if: github.event_name == 'schedule'
        run: |
          LOG_OUTPUT=$(git log \
            --since='26 hours ago' \
            --oneline \
            -- . ':(exclude).github/**' \
            | grep -v '\[bot\]' \
            | grep -v 'github-actions' \
            | grep -v '^\[NIGHTLY\]' \
            || true)

          echo "Git log output:"
          echo "$LOG_OUTPUT"
          
          if echo "$LOG_OUTPUT" | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Decide if pipeline should run
        id: decision
        run: |
          HAS_CHANGES="${{ steps.changes.outputs.has_changes }}"
          IS_SNAPSHOT="${{ steps.snapshot.outputs.is_snapshot }}"

          echo "has_changes=$HAS_CHANGES"
          echo "is_snapshot=$IS_SNAPSHOT"
          echo "event=${{ github.event_name }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [[ "$IS_SNAPSHOT" == "true" && "$HAS_CHANGES" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  format:
    needs: prepare
    runs-on: [self-hosted, linux]

    if: >
      needs.prepare.outputs.is_snapshot == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.prepare.outputs.has_changes == 'true'
      )

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Apply formatting
        run: mvn -B -Pformat clean initialize spotless:apply

      - name: Commit & push if needed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git diff --cached --quiet || git commit -m "[NIGHTLY] Apply code formatting"

          git push || echo "Push failed, continuing..."

  linux:
    needs: [prepare, format]
    runs-on: [self-hosted, linux]

    if: >
      needs.prepare.outputs.is_snapshot == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.prepare.outputs.has_changes == 'true'
      )

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [{
              "id": "nexus.kbra.lu-nightly",
              "username": "${{ secrets.MAVEN_USERNAME }}",
              "password": "${{ secrets.MAVEN_PASSWORD }}"
            },
            {
              "id": "steam",
              "username": "${{ secrets.STEAM_USERNAME }}",
              "password": "${{ secrets.STEAM_PASSWORD }}"
            }]
            
      - name: Clone pclib
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UnKabaraQuiDev/PCLib.git pclib

      - name: Build pclib
        run: mvn -B install -DskipTests
        working-directory: pclib

      - name: Clone StandaloneGameEngine
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UnKabaraQuiDev/StandaloneGameEngine.git gameengine

      - name: Build StandaloneGameEngine
        run: mvn -B install -DskipTests
        working-directory: gameengine

      - name: Build Linux
        run: bash ./scripts/build-nightly-linux.sh

  windows:
    needs: [prepare, format]
    runs-on: [self-hosted, windows]

    if: >
      needs.prepare.outputs.is_snapshot == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.prepare.outputs.has_changes == 'true'
      )

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [{
              "id": "nexus.kbra.lu-nightly",
              "username": "${{ secrets.MAVEN_USERNAME }}",
              "password": "${{ secrets.MAVEN_PASSWORD }}"
            },
            {
              "id": "steam",
              "username": "${{ secrets.STEAM_USERNAME }}",
              "password": "${{ secrets.STEAM_PASSWORD }}"
            }]

      - name: Clone pclib
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UnKabaraQuiDev/PCLib.git pclib

      - name: Build pclib
        run: mvn -B install -DskipTests
        working-directory: pclib

      - name: Clone StandaloneGameEngine
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UnKabaraQuiDev/StandaloneGameEngine.git gameengine

      - name: Build StandaloneGameEngine
        run: mvn -B install -DskipTests
        working-directory: gameengine

      - name: Build Windows
        run: bash ./scripts/build-nightly-windows.sh
