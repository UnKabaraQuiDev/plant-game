# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Debug
      run: git log --pretty=fuller --name-only -20

    - name: Check for commits in last 26h
      id: changes
      if: github.event_name == 'schedule'
      run: |
        git log --since='26 hours ago' -1 --oneline -- . ':(exclude).github/**'
        if [ -n "$(git log --since='26 hours ago' -1 --oneline -- . ':(exclude).github/**')" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        cat $GITHUB_OUTPUT

    - name: Detect SNAPSHOT version
      id: snapshot
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "version=$VERSION"
        if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
          echo "is_snapshot=true" >> $GITHUB_OUTPUT
        else
          echo "is_snapshot=false" >> $GITHUB_OUTPUT
        fi

    - name: Stop if not snapshot
      if: steps.snapshot.outputs.is_snapshot == 'false'
      run: |
        echo "Not a snapshot. Skipping build."

    - name: Stop if no changes
      if: github.event_name == 'schedule' && steps.changes.outputs.has_changes == 'false'
      run: |
        echo "No commits in last 26 hours. Skipping build."

    - uses: actions/setup-java@v5
      if: >
        steps.snapshot.outputs.is_snapshot == 'true' &&
        (
          github.event_name != 'schedule' ||
          steps.changes.outputs.has_changes == 'true'
        )
      with:
        distribution: temurin
        java-version: 17
        server-id: nexus.kbra.lu-snapshots
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD

    - uses: actions/setup-java@v5
      if: >
        steps.snapshot.outputs.is_snapshot == 'true' &&
        (
          github.event_name != 'schedule' ||
          steps.changes.outputs.has_changes == 'true'
        )
      with:
        distribution: temurin
        java-version: 17
        server-id: steam
        server-username: STEAM_USERNAME
        server-password: STEAM_PASSWORD

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Deploy nightly
      if: >
        steps.snapshot.outputs.is_snapshot == 'true' &&
        (
          github.event_name != 'schedule' ||
          steps.changes.outputs.has_changes == 'true'
        )
      run: bash ./build-nightly.sh
